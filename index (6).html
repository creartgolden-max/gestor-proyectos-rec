<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Proyectos · REC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#0A1834; --navy:#0B2A6B; --navy2:#12347E;
  --blue:#2F6BFF; --blue-d:#1E4FD0; --blue-soft:#E8EFFF;
  --gold:#C9A227; --gold-soft:#F7EFD3;
  --bg:#F3F6FC; --surface:#FFFFFF; --surface-2:#FAFBFE;
  --line:#E5EAF2; --line-2:#EEF2F8;
  --text:#16213D; --muted:#6B7790; --faint:#9AA5BC;
  --green:#15A34A; --green-soft:#E3F6EA;
  --amber:#E89611; --amber-soft:#FCF1DC;
  --red:#E0245A; --red-soft:#FCE4EC;
  --violet:#7A4FD0; --violet-soft:#F1ECFB;
  --r:18px;
  --sh-sm:0 1px 2px rgba(16,34,80,.06), 0 1px 3px rgba(16,34,80,.05);
  --sh:0 8px 28px rgba(16,34,80,.10);
  --sh-lg:0 24px 60px rgba(16,34,80,.18);
  --font-d:"Bricolage Grotesque", serif;
  --font-b:"Plus Jakarta Sans", system-ui, sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:var(--font-b);color:var(--text);background:var(--bg);-webkit-font-smoothing:antialiased;line-height:1.45;
  background-image:radial-gradient(1200px 600px at 90% -10%, #EAF0FE 0%, transparent 60%),radial-gradient(900px 500px at -10% 0%, #F0F4FF 0%, transparent 55%);background-attachment:fixed;}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
::selection{background:var(--blue);color:#fff}

.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(100deg,var(--ink),var(--navy) 55%,var(--navy2));color:#fff;
  padding:13px clamp(16px,4vw,40px);display:flex;align-items:center;gap:16px;box-shadow:0 10px 30px rgba(10,24,52,.28);flex-wrap:wrap}
.brand{display:flex;align-items:center;gap:13px;min-width:0}
.brand .mark{width:42px;height:42px;border-radius:12px;flex:none;background:linear-gradient(135deg,var(--blue),#5C8BFF);display:grid;place-items:center;font-family:var(--font-d);font-weight:800;font-size:19px;color:#fff;position:relative;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18),0 6px 16px rgba(47,107,255,.45)}
.brand .mark .dot{width:6px;height:6px;border-radius:50%;background:var(--gold);position:absolute;top:7px;right:7px}
.brand h1{font-family:var(--font-d);font-weight:700;font-size:18px;letter-spacing:-.2px;line-height:1.05}
.brand p{font-size:11.5px;color:#A9BBE6;font-weight:500;letter-spacing:.3px}
.spacer{flex:1}
.nav{display:flex;gap:4px;background:rgba(255,255,255,.07);padding:4px;border-radius:12px;flex-wrap:wrap}
.nav button{padding:8px 15px;border-radius:9px;font-weight:600;font-size:13.5px;color:#C6D2F2;transition:.18s;white-space:nowrap}
.nav button.active{background:#fff;color:var(--ink);box-shadow:var(--sh-sm)}
.nav button:not(.active):hover{color:#fff;background:rgba(255,255,255,.06)}
.tb-actions{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 16px;border-radius:11px;font-weight:600;font-size:13.5px;transition:.16s;white-space:nowrap}
.btn svg{width:16px;height:16px}
.btn-gold{background:linear-gradient(135deg,var(--gold),#E0B53C);color:#3A2E00;box-shadow:0 6px 18px rgba(201,162,39,.45)}
.btn-gold:hover{transform:translateY(-1px)}
.btn-primary{background:var(--blue);color:#fff;box-shadow:0 6px 18px rgba(47,107,255,.42)}
.btn-primary:hover{background:var(--blue-d);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff}.btn-ghost:hover{background:rgba(255,255,255,.18)}
.btn-soft{background:var(--blue-soft);color:var(--blue-d)}.btn-soft:hover{background:#DCE7FF}
.btn-line{background:#fff;color:var(--text);box-shadow:inset 0 0 0 1px var(--line)}.btn-line:hover{background:var(--surface-2)}
.usrchip{display:flex;align-items:center;gap:9px;background:rgba(255,255,255,.1);padding:6px 8px 6px 12px;border-radius:12px}
.usrchip .nm{font-size:13px;font-weight:600;color:#fff;line-height:1}.usrchip .ro{font-size:10.5px;color:#A9BBE6;font-weight:500}
.usrchip .av{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,var(--gold),#E0B53C);color:#3A2E00;display:grid;place-items:center;font-family:var(--font-d);font-weight:700;font-size:13px}
.usrchip .out{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:#A9BBE6;transition:.15s}.usrchip .out:hover{background:rgba(255,255,255,.15);color:#fff}
.sync{font-size:11px;color:#9FB2DF;display:flex;align-items:center;gap:6px;font-weight:500}
.sync .pip{width:7px;height:7px;border-radius:50%;background:#5C8BFF;box-shadow:0 0 0 3px rgba(92,139,255,.25)}
.sync.saved .pip{background:var(--green)}.sync.local .pip{background:var(--gold)}

.wrap{max-width:1320px;margin:0 auto;padding:clamp(20px,3vw,34px) clamp(16px,4vw,40px) 64px}
.view{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}
.page-head h2{font-family:var(--font-d);font-weight:700;font-size:clamp(24px,3vw,32px);letter-spacing:-.6px}
.page-head .sub{color:var(--muted);font-size:14px;margin-top:2px;font-weight:500}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(158px,1fr));gap:15px;margin-bottom:20px}
.kpi{background:var(--surface);border-radius:var(--r);padding:18px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;border:1px solid var(--line-2);transition:.2s;animation:rise .5s both}
.kpi:hover{box-shadow:var(--sh);transform:translateY(-2px)}
.kpi .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;margin-bottom:12px}.kpi .ic svg{width:18px;height:18px}
.kpi .val{font-family:var(--font-d);font-weight:700;font-size:31px;line-height:1;letter-spacing:-1px}
.kpi .lbl{color:var(--muted);font-size:12px;font-weight:600;margin-top:6px}
.kpi .accent{position:absolute;right:-18px;top:-18px;width:78px;height:78px;border-radius:50%;opacity:.06}
.tone-blue .ic{background:var(--blue-soft);color:var(--blue-d)}.tone-blue .accent{background:var(--blue)}
.tone-green .ic{background:var(--green-soft);color:var(--green)}.tone-green .accent{background:var(--green)}
.tone-amber .ic{background:var(--amber-soft);color:var(--amber)}.tone-amber .accent{background:var(--amber)}
.tone-red .ic{background:var(--red-soft);color:var(--red)}.tone-red .accent{background:var(--red)}
.tone-ink .ic{background:#E7ECF7;color:var(--ink)}.tone-ink .accent{background:var(--ink)}
.tone-gold .ic{background:var(--gold-soft);color:#9A7B12}.tone-gold .accent{background:var(--gold)}

.grid-2{display:grid;grid-template-columns:1.12fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
.panel{background:var(--surface);border-radius:var(--r);padding:22px;box-shadow:var(--sh-sm);border:1px solid var(--line-2)}
.panel h3{font-family:var(--font-d);font-weight:700;font-size:16px;letter-spacing:-.2px;margin-bottom:2px}
.panel .ph-sub{color:var(--faint);font-size:12px;font-weight:500;margin-bottom:18px}
.donut-wrap{display:flex;align-items:center;gap:24px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:10px;flex:1;min-width:140px}
.leg{display:flex;align-items:center;gap:10px;font-size:13px;font-weight:500}.leg .sw{width:11px;height:11px;border-radius:3px;flex:none}.leg b{margin-left:auto;font-family:var(--font-d);font-weight:700;font-size:15px}
.bars{display:flex;flex-direction:column;gap:14px}
.barrow .bl{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;margin-bottom:6px}
.barrow .bl .nm{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:60%}.barrow .bl .pc{color:var(--muted);font-variant-numeric:tabular-nums}
.track{height:11px;background:var(--line-2);border-radius:99px;position:relative;overflow:hidden}
.fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),#5C8BFF);transition:width 1s cubic-bezier(.2,.8,.2,1)}
.expected{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);border-radius:2px;opacity:.55}
.expected::after{content:"";position:absolute;top:-4px;left:-3px;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--ink);opacity:.7}
.fuente-list{display:flex;flex-direction:column;gap:11px}
.frow2{display:flex;align-items:center;gap:12px}.frow2 .fn{font-size:13px;font-weight:600;min-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.frow2 .ft{flex:1;height:9px;background:var(--line-2);border-radius:99px;overflow:hidden}.frow2 .ft i{display:block;height:100%;border-radius:99px}
.frow2 .fc{font-family:var(--font-d);font-weight:700;font-size:13px;color:var(--muted);min-width:54px;text-align:right}

.toolbar{display:flex;gap:10px;flex-wrap:wrap;align-items:center;margin-bottom:20px}
.search{flex:1;min-width:190px;position:relative}.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--faint)}
.search input{width:100%;padding:11px 14px 11px 40px;border-radius:12px;border:1px solid var(--line);background:var(--surface);outline:none;transition:.16s}
.search input:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-soft)}
.fsel{padding:11px 13px;border-radius:12px;border:1px solid var(--line);background:var(--surface);outline:none;font-weight:600;color:var(--text);cursor:pointer;transition:.16s}
.fsel:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-soft)}

.cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(335px,1fr));gap:18px}
.pcard{background:var(--surface);border-radius:var(--r);padding:19px;box-shadow:var(--sh-sm);border:1px solid var(--line-2);cursor:pointer;transition:.2s;position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px;animation:rise .5s both}
.pcard:hover{box-shadow:var(--sh);transform:translateY(-3px);border-color:#D6E0F2}
.pcard .risk-edge{position:absolute;left:0;top:0;bottom:0;width:4px}
.pcard .top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
.pcard .ttl{font-family:var(--font-d);font-weight:700;font-size:16px;letter-spacing:-.3px;line-height:1.18}
.modbadge{font-size:10px;font-weight:700;padding:4px 8px;border-radius:7px;letter-spacing:.3px;display:inline-flex;align-items:center;gap:5px;white-space:nowrap}
.modbadge svg{width:12px;height:12px}
.m-ind{background:#EAF0FB;color:#4A5B86}.m-grp{background:var(--green-soft);color:#0F7A38}
.fuente-tag{font-size:11px;font-weight:700;color:var(--violet);background:var(--violet-soft);padding:4px 9px;border-radius:7px;display:inline-flex;align-items:center;gap:5px}
.fuente-tag svg{width:12px;height:12px}
.meta-row{display:flex;flex-wrap:wrap;gap:7px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:600;color:#46506B;background:var(--surface-2);border:1px solid var(--line-2);padding:5px 10px;border-radius:8px}
.chip svg{width:13px;height:13px;color:var(--faint)}
.chip.rev{background:#F3F0FB;border-color:#E7E0F6;color:#6A4FB0}
.nota{font-size:12.5px;color:var(--muted);background:var(--surface-2);border:1px solid var(--line-2);border-radius:10px;padding:9px 11px;line-height:1.4;font-style:italic}
.nota.empty{color:var(--faint);font-style:normal}
.prog .pl{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:7px}.prog .pl .a{color:var(--text)}.prog .pl .e{color:var(--faint)}
.pcard .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:auto;padding-top:2px}
.estado{display:inline-flex;align-items:center;gap:7px;font-size:12px;font-weight:700;padding:5px 11px;border-radius:8px}.estado .d{width:7px;height:7px;border-radius:50%}
.s-todo{background:#EEF1F6;color:#5A6580}.s-todo .d{background:#8A95AD}
.s-prog{background:var(--blue-soft);color:var(--blue-d)}.s-prog .d{background:var(--blue)}
.s-pause{background:var(--amber-soft);color:#8A6A12}.s-pause .d{background:var(--amber)}
.s-cancel{background:#F1F2F5;color:#9AA5BC}.s-cancel .d{background:#9AA5BC}
.s-done{background:var(--green-soft);color:#0F7A38}.s-done .d{background:var(--green)}
.days{font-size:12px;font-weight:600;color:var(--muted)}.days b{font-family:var(--font-d);color:var(--text)}.days.over{color:var(--red)}.days.over b{color:var(--red)}

.empty{text-align:center;padding:64px 20px;color:var(--muted)}.empty .big{font-family:var(--font-d);font-size:19px;color:var(--text);margin:14px 0 6px}

.mihoja-head{background:linear-gradient(120deg,var(--ink),var(--navy));color:#fff;border-radius:var(--r);padding:22px 24px;display:flex;align-items:center;gap:18px;margin-bottom:20px;position:relative;overflow:hidden}
.mihoja-head .glow{position:absolute;right:-30px;top:-40px;width:180px;height:180px;border-radius:50%;background:var(--blue);opacity:.18}
.mihoja-head .av{width:56px;height:56px;border-radius:15px;background:linear-gradient(135deg,var(--gold),#E0B53C);color:#3A2E00;display:grid;place-items:center;font-family:var(--font-d);font-weight:800;font-size:23px;flex:none}
.mihoja-head .nm{font-family:var(--font-d);font-weight:700;font-size:21px;letter-spacing:-.3px}
.mihoja-head .ro{color:#B9C7EC;font-size:13px;font-weight:500;margin-top:2px}
.mihoja-head .stat{margin-left:auto;text-align:right;z-index:1}.mihoja-head .stat .big{font-family:var(--font-d);font-weight:700;font-size:30px;line-height:1}.mihoja-head .stat .lb{color:#B9C7EC;font-size:11.5px;font-weight:600}
@media(max-width:540px){.mihoja-head .stat{display:none}}

.scrim{position:fixed;inset:0;background:rgba(8,18,42,.5);backdrop-filter:blur(5px);z-index:100;display:grid;place-items:start center;padding:40px 16px;overflow-y:auto;animation:fade .2s}
@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:24px;width:100%;max-width:640px;box-shadow:var(--sh-lg);overflow:hidden;animation:pop .35s cubic-bezier(.2,.8,.2,1) both}
.modal.sm{max-width:430px}
@keyframes pop{from{opacity:0;transform:translateY(24px) scale(.97)}to{opacity:1;transform:none}}
.modal-head{padding:24px 26px 20px;border-bottom:1px solid var(--line-2);display:flex;justify-content:space-between;align-items:flex-start;gap:14px;position:relative;overflow:hidden}
.modal-head .glow{position:absolute;right:-30px;top:-40px;width:160px;height:160px;border-radius:50%;background:var(--blue);opacity:.06}
.modal-head h3{font-family:var(--font-d);font-weight:700;font-size:21px;letter-spacing:-.4px;line-height:1.15}
.modal-head .hsub{color:var(--muted);font-size:13px;font-weight:500;margin-top:3px}
.xclose{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--surface-2);color:var(--muted);transition:.15s;flex:none}.xclose:hover{background:var(--red-soft);color:var(--red)}
.modal-body{padding:24px 26px;max-height:64vh;overflow-y:auto}
.modal-foot{padding:18px 26px;border-top:1px solid var(--line-2);display:flex;gap:10px;justify-content:flex-end;background:var(--surface-2);flex-wrap:wrap}

.field{margin-bottom:15px}
.field label{display:block;font-size:12.5px;font-weight:700;color:#46506B;margin-bottom:7px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border-radius:11px;border:1px solid var(--line);background:var(--surface);outline:none;transition:.16s}
.field textarea{resize:vertical;min-height:60px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-soft)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:13px}@media(max-width:540px){.frow{grid-template-columns:1fr}}
.seg{display:flex;gap:6px;background:var(--surface-2);padding:5px;border-radius:12px;border:1px solid var(--line-2)}
.seg button{flex:1;padding:9px;border-radius:8px;font-weight:700;font-size:12.5px;color:var(--muted);transition:.15s}.seg button.on{background:var(--surface);color:var(--ink);box-shadow:var(--sh-sm)}
.term-toggle{display:flex;gap:6px;margin-bottom:8px}.term-toggle button{padding:6px 12px;border-radius:8px;font-size:12px;font-weight:700;color:var(--muted);background:var(--surface-2);border:1px solid var(--line-2)}.term-toggle button.on{background:var(--blue-soft);color:var(--blue-d);border-color:#CFE0FF}
.tasks{display:flex;flex-direction:column;gap:9px}
.task{background:var(--surface-2);border:1px solid var(--line-2);border-radius:12px;padding:11px 12px;display:flex;gap:9px;align-items:center}
.task input{flex:1;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:#fff}
.task .trash{width:32px;height:32px;border-radius:8px;background:#fff;border:1px solid var(--line);display:grid;place-items:center;color:var(--faint);flex:none;transition:.15s}.task .trash:hover{background:var(--red-soft);color:var(--red)}
.addtask{padding:10px;border-radius:11px;border:1.5px dashed var(--line);color:var(--blue-d);font-weight:700;font-size:13px;width:100%;transition:.15s;display:flex;align-items:center;justify-content:center;gap:7px}.addtask:hover{border-color:var(--blue);background:var(--blue-soft)}
.slid{display:flex;align-items:center;gap:14px}.slid input[type=range]{flex:1;accent-color:var(--blue);height:7px}.slid .pv{font-family:var(--font-d);font-weight:700;font-size:20px;min-width:60px;text-align:right;color:var(--blue-d)}

.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:18px}@media(max-width:540px){.dgrid{grid-template-columns:1fr}}
.dcell{background:var(--surface-2);border:1px solid var(--line-2);border-radius:13px;padding:13px 14px}
.dcell .k{font-size:11px;font-weight:700;color:var(--faint);text-transform:uppercase;letter-spacing:.4px;margin-bottom:5px}.dcell .v{font-size:14px;font-weight:600;color:var(--text)}
.dprog{background:var(--surface-2);border:1px solid var(--line-2);border-radius:14px;padding:18px;margin-bottom:16px}
.dprog .nums{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:12px}
.dprog .big{font-family:var(--font-d);font-weight:700;font-size:40px;letter-spacing:-1.5px;line-height:.9}.dprog .exp{font-size:13px;font-weight:600;color:var(--muted)}
.notebox{background:#FFFDF5;border:1px solid #EFE6C8;border-radius:12px;padding:13px 15px;font-size:13.5px;color:#594E2C;line-height:1.5;margin-bottom:16px}
.notebox .nk{font-size:10.5px;font-weight:700;color:#A8902F;text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px}
.integ{display:flex;flex-direction:column;gap:8px}.intg{display:flex;gap:11px;align-items:center;padding:10px 13px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:11px}
.intg .who{font-weight:700;font-size:13.5px;flex:none;max-width:38%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.intg .what{color:var(--muted);font-size:12.5px;flex:1;min-width:0}
.intg .ico{width:28px;height:28px;border-radius:8px;background:var(--green-soft);color:#0F7A38;display:grid;place-items:center;font-family:var(--font-d);font-weight:700;font-size:12px;flex:none}

.rdot{width:11px;height:11px;border-radius:50%;flex:none;box-shadow:0 0 0 3px rgba(0,0,0,.04)}
.r-ok{background:var(--green)}.r-warn{background:var(--amber)}.r-late{background:var(--red)}.r-done{background:var(--blue)}.r-pause{background:var(--amber)}.r-cancel{background:#9AA5BC}

.report-head{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;border-bottom:3px solid var(--ink);padding-bottom:18px;margin-bottom:22px;flex-wrap:wrap}

<script>
/* ============================================================
   ███  CONFIG — SUPABASE  ███
   ============================================================ */
const CONFIG = {
  SUPABASE_URL: "https://qcwpnovwyhzhqqmhjxco.supabase.co",
  SUPABASE_ANON_KEY: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFjd3Bub3Z3eWh6aHFxbWhqeGNvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk3MDA3OTUsImV4cCI6MjA5NTI3Njc5NX0.-MSnn07PdxstQ90OLf16823Nvihr47ePXoQSFvgC3mU",
  POLL_MS: 30000,   // cada cuántos ms refresca datos en segundo plano
  FUENTES: ["Planeación estratégica","Matriz de riesgo","Acción correctiva","Plan de mejora","Minuta de reunión","Agenda de ventas","Auditoría interna","Auditoría externa"],
  ESTADOS: ["Sin comenzar","En proceso","En pausa","Cancelado","Concluido"],
  REVISORES: ["Dirección General","Gerencia de Operaciones","Coord. Administrativa","Comité de Calidad","Comité de Mejora Continua"]
};
const STATUS_META = {
  "Sin comenzar":{cls:"s-todo", color:"#8A95AD", pct:0},
  "En proceso":  {cls:"s-prog", color:"#2F6BFF", pct:50},
  "En pausa":    {cls:"s-pause",color:"#E89611", pct:null},
  "Cancelado":   {cls:"s-cancel",color:"#9AA5BC",pct:0},
  "Concluido":   {cls:"s-done", color:"#15A34A", pct:100}
};
/* ---- PINs por defecto (cámbialos): admin = Rodrigo ---- */
const SEED = { meta:{updated:new Date().toISOString()},
  /* SEED vacío en versión publicable. Los datos reales viven en Supabase. */
  people:[],
  projects:[],
  tasks:[]
}

/* ============ ESTADO GLOBAL ============ */
let STATE = JSON.parse(JSON.stringify(SEED));
let LOADED = false;        // true cuando ya cargó de Supabase al menos una vez
let ME = null;            // persona logueada
let VIEW = "dash";
let FILTERS = {q:"",fuente:"",estado:"",modalidad:"",persona:""};
const cfgOK = CONFIG.SUPABASE_URL && CONFIG.SUPABASE_URL.startsWith("https://") && CONFIG.SUPABASE_ANON_KEY && CONFIG.SUPABASE_ANON_KEY.startsWith("eyJ");

/* ============ HELPERS ============ */
const today=()=>{const d=new Date();d.setHours(0,0,0,0);return d;};
const isDate=s=>/^\d{4}-\d{2}-\d{2}$/.test(s||"");
const parseD=s=>isDate(s)?new Date(s+"T00:00:00"):null;
const DAY=86400000;
const fmtD=s=>{const d=parseD(s);return d?d.toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"}):(s||"—");};
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const val=id=>{const e=document.getElementById(id);return e?e.value:"";};
const person=id=>STATE.people.find(p=>p.id===id);
const initials=n=>(n||"?").split(" ").filter(Boolean).slice(0,2).map(w=>w[0]).join("").toUpperCase();
/* etiqueta visible de una persona = su PUESTO (desambigua con área si se repite) */
function disp(pe){if(!pe)return"—";const dup=STATE.people.filter(x=>x.puesto===pe.puesto).length>1;return dup?`${pe.puesto} · ${pe.proceso}`:pe.puesto;}
const pinit=pe=>initials(pe?pe.puesto:"?");
const sCls=s=>(STATUS_META[s]||{}).cls||"s-todo";

function calc(p){
  const a=parseD(p.inicio), b=parseD(p.termino), t=today();
  let total=null,trans=null,rest=null,esperado=null;
  if(a&&b){total=Math.max(0,Math.round((b-a)/DAY));trans=t<a?0:t>b?total:Math.round((t-a)/DAY);rest=Math.round((b-t)/DAY);esperado=total>0?Math.min(100,Math.round(trans/total*100)):0;}
  const hitos=p.hitos||[];
  const hechos=hitos.filter(h=>h.hecho).length;
  const avance=hitos.length?Math.round(hechos/hitos.length*100):0;
  // status efectivo: pausado/cancelado se respetan; el resto se deriva de hitos
  let status=p.status;
  if(p.status!=="En pausa"&&p.status!=="Cancelado"){
    if(hitos.length===0)status="Sin comenzar";
    else if(hechos===0)status="Sin comenzar";
    else if(hechos===hitos.length)status="Concluido";
    else status="En proceso";
  }
  let risk="r-ok";
  if(status==="Concluido")risk="r-done";
  else if(status==="Cancelado")risk="r-cancel";
  else if(status==="En pausa")risk="r-pause";
  else if(b&&t>b)risk="r-late";
  else if(esperado===null)risk="r-ok";
  else if(avance>=esperado)risk="r-ok";
  else if(esperado-avance<=15)risk="r-warn";
  else risk="r-late";
  const vencido=b&&t>b&&status!=="Concluido"&&status!=="Cancelado";
  return {total,trans,rest,esperado,avance,risk,vencido,status,hechos,nHitos:hitos.length,termText:isDate(p.termino)?null:p.termino};
}
const barColor=r=>r==="r-late"?"linear-gradient(90deg,#E0245A,#F4567E)":r==="r-warn"?"linear-gradient(90deg,#E89611,#F5B544)":r==="r-done"?"linear-gradient(90deg,#15A34A,#3FC76D)":r==="r-cancel"?"linear-gradient(90deg,#B7C0D2,#CDD5E3)":"linear-gradient(90deg,#2F6BFF,#5C8BFF)";
const riskEdge=r=>r==="r-late"?"var(--red)":r==="r-warn"?"var(--amber)":r==="r-done"?"var(--green)":r==="r-pause"?"var(--amber)":r==="r-cancel"?"#9AA5BC":"var(--blue)";
const canEdit=p=>ME&&(ME.admin||p.ownerId===ME.id);
/* roles: direccion (todo) · coordinacion (ve ejecutivo, solo lectura) · responsable (su hoja) */
const roleOf=pe=>pe?(pe.rol||(pe.admin?"direccion":"responsable")):"responsable";
const isDir=()=>ME&&roleOf(ME)==="direccion";
const isCoord=()=>ME&&roleOf(ME)==="coordinacion";
const canSeeExec=()=>isDir()||isCoord();   // quién ve el dashboard ejecutivo y proyectos completos

/* solicitudes pendientes (no aprobadas/rechazadas aún) */
const pend=(s)=>s&&s.estado!=="aprobada"&&s.estado!=="rechazada";
function pendingReqs(){
  const out=[];
  STATE.projects.forEach(p=>{
    if(pend(p.prorroga))out.push({tipo:"prorroga",p,req:p.prorroga});
    if(pend(p.ayuda))out.push({tipo:"ayuda",p,req:p.ayuda});
    if(pend(p.cancelacion))out.push({tipo:"cancelacion",p,req:p.cancelacion});
  });
  return out;
}

/* link a Google Calendar (sin backend) */
function gcalLink(p){
  const c=calc(p);
  const b=parseD(p.termino);
  let dates="";
  if(b){const d=p.termino.replace(/-/g,"");const nx=new Date(b.getTime()+86400000);const e=nx.toISOString().slice(0,10).replace(/-/g,"");dates=`&dates=${d}/${e}`;}
  const titulo=encodeURIComponent(`⏰ Deadline: ${p.nombre}`);
  const owner=disp(person(p.ownerId));
  const det=encodeURIComponent(
    `Proyecto: ${p.nombre}\n`+

let SB = null;                      // cliente supabase-js
let LAST_SNAPSHOT = null;           // copia de STATE tras último sync, para diff
let POLL_TIMER = null;

function initSupabase(){
  if(!cfgOK) return false;
  if(SB) return true;
  try{
    SB = window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY);
    return true;
  }catch(e){ console.error("Supabase init:",e); return false; }
}
function setSync(m){const e=document.getElementById("sync");if(!e)return;e.className="sync "+m;e.querySelector("span:last-child").textContent=m==="saved"?"Guardado":m==="local"?"Sin conexión":"Sincronizando…";}

/* ---------- Mapeo DB <-> JS ---------- */
function dbToPerson(r){return {id:r.id,nombre:r.nombre||"",puesto:r.puesto,proceso:r.proceso||"",pin:r.pin,rol:r.rol||"responsable",admin:!!r.admin};}
function dbToProject(r){return {id:r.id,nombre:r.nombre,fuente:r.fuente,modalidad:r.modalidad||"individual",ownerId:r.owner_id||"",revisor:r.revisor||"",integrantes:r.integrantes||[],hitos:r.hitos||[],inicio:r.inicio||"",termino:r.termino||"",status:r.status||"Sin comenzar",nota:r.nota||"",obs:r.obs||"",ayuda:r.ayuda,prorroga:r.prorroga,cancelacion:r.cancelacion};}
function dbToTask(r){return {id:r.id,ownerId:r.owner_id,titulo:r.titulo,tipo:r.tipo||"fija",rec:r.rec,fecha:r.fecha||"",hora:r.hora||"",conflicto:!!r.conflicto,notas:r.notas||"",hechas:r.hechas==null?{}:r.hechas};}

/* ---------- LOAD: trae todo desde Supabase ---------- */
async function load(){
  if(!initSupabase()){ console.error("[DIAG] initSupabase failed - cfgOK?", cfgOK, "URL?", CONFIG.SUPABASE_URL?.slice(0,40), "KEY len?", CONFIG.SUPABASE_ANON_KEY?.length); setSync("local"); return; }
  try{
    setSync("syncing");
    console.log("[DIAG] load: pidiendo a Supabase...");
    const [pe,pr,tk]=await Promise.all([
      SB.from("gpr_people").select("*"),
      SB.from("gpr_projects").select("*"),
      SB.from("gpr_tasks").select("*")
    ]);
    console.log("[DIAG] load: respuestas recibidas.");
    if(pe.error){ console.error("[DIAG] ERROR gpr_people:", pe.error.message, "| code:", pe.error.code, "| details:", pe.error.details, "| hint:", pe.error.hint); }
    if(pr.error){ console.error("[DIAG] ERROR gpr_projects:", pr.error.message, "| code:", pr.error.code, "| details:", pr.error.details, "| hint:", pr.error.hint); }
    if(tk.error){ console.error("[DIAG] ERROR gpr_tasks:", tk.error.message, "| code:", tk.error.code, "| details:", tk.error.details, "| hint:", tk.error.hint); }
    if(pe.error||pr.error||tk.error){ setSync("local"); return; }
    console.log("[DIAG] load OK. Personas:", pe.data?.length, "| Proyectos:", pr.data?.length, "| Tareas:", tk.data?.length);
    STATE.people   = (pe.data||[]).map(dbToPerson);
    STATE.projects = (pr.data||[]).map(dbToProject);
    STATE.tasks    = (tk.data||[]).map(dbToTask);
    LAST_SNAPSHOT = JSON.parse(JSON.stringify({people:STATE.people,projects:STATE.projects,tasks:STATE.tasks}));
    LOADED = true;
    setSync("saved");
  }catch(e){ console.error("[DIAG] load THREW:", e?.message||e, "| stack:", e?.stack); setSync("local"); }
}

/* ---------- helpers de diff por id ---------- */
const byId = arr => Object.fromEntries((arr||[]).map(x=>[x.id,x]));
const eq = (a,b) => JSON.stringify(a)===JSON.stringify(b);

/* ---------- SAVE: calcula diff y manda solo lo cambiado vía RPC ---------- */
async function save(){
  STATE.meta = {updated:new Date().toISOString()};
  if(!initSupabase()){ setSync("local"); return; }
  if(!LOADED){ console.warn("save() abortado: aún no cargó de Supabase"); return; }
  if(!ME || !ME.pin){ setSync("local"); return; }   // sin sesión, no se puede escribir
  const pin = ME.pin;
  try{
    setSync("syncing");
    const ops = [];
    const snap = LAST_SNAPSHOT || {people:[],projects:[],tasks:[]};

    // -------- PEOPLE --------
    const oldP = byId(snap.people), newP = byId(STATE.people||[]);
    for(const id in newP){
      if(!oldP[id] || !eq(oldP[id], newP[id])){
        ops.push(SB.rpc("gpr_upsert_person", {p_pin:pin, p:newP[id]}));
      }
    }
    for(const id in oldP){ if(!newP[id]) ops.push(SB.rpc("gpr_delete_person", {p_pin:pin, p_id:id})); }

    // -------- PROJECTS --------
    const oldR = byId(snap.projects), newR = byId(STATE.projects||[]);
    for(const id in newR){
      if(!oldR[id] || !eq(oldR[id], newR[id])){
        ops.push(SB.rpc("gpr_upsert_project", {p_pin:pin, p:newR[id]}));
      }
    }
    for(const id in oldR){ if(!newR[id]) ops.push(SB.rpc("gpr_delete_project", {p_pin:pin, p_id:id})); }

    // -------- TASKS --------
    const oldT = byId(snap.tasks), newT = byId(STATE.tasks||[]);
    for(const id in newT){
      if(!oldT[id] || !eq(oldT[id], newT[id])){
        ops.push(SB.rpc("gpr_upsert_task", {p_pin:pin, t:newT[id]}));
      }
    }
    for(const id in oldT){ if(!newT[id]) ops.push(SB.rpc("gpr_delete_task", {p_pin:pin, t_id:id})); }

    if(ops.length===0){ setSync("saved"); return; }

    const results = await Promise.all(ops);
    const errs = results.filter(r=>r.error);
    if(errs.length){
      console.error("save errors:", errs.map(e=>e.error?.message));
      toast("Error al guardar: " + (errs[0].error?.message||"verifica permisos"));
      // recarga estado real para no quedar desincronizado
      await load();
      render();
      return;
    }
    // actualizar snapshot
    LAST_SNAPSHOT = JSON.parse(JSON.stringify({people:STATE.people,projects:STATE.projects,tasks:STATE.tasks}));
    setSync("saved");
  }catch(e){ console.error("save:",e); setSync("local"); }
}

/* ---------- POLLING: refresca cada 30s en segundo plano ---------- */
function startPolling(){
  if(POLL_TIMER) clearInterval(POLL_TIMER);
  POLL_TIMER = setInterval(async ()=>{
    // no refrescar si hay un modal abierto (el usuario está editando)
    if(document.querySelector(".scrim")) return;
    const prev = JSON.stringify({p:STATE.projects,t:STATE.tasks,u:STATE.people});
    await load();
    const now = JSON.stringify({p:STATE.projects,t:STATE.tasks,u:STATE.people});
    if(prev !== now) render();
  }, CONFIG.POLL_MS||30000);
}

let TASK_TAB = "hoy"; // hoy | semana | mes
let TASK_VIEW_OWNER = null; // si está set, admin/coord viendo tareas de otro

const DAY_LBL=["D","L","M","X","J","V","S"]; // 0=D
const DAY_FULL=["Domingo","Lunes","Martes","Miércoles","Jueves","Viernes","Sábado"];
const MONTH_LBL=["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
const ymd=d=>d.toISOString().slice(0,10);
const dateFromYmd=s=>{const [y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};

// ¿la tarea aplica este día? (Date object)
function taskApplies(t, d){
  if(t.tipo==="eventual") return t.fecha===ymd(d);
  if(!t.rec) return false;
  if(t.rec.freq==="diaria") return true;
  if(t.rec.freq==="semanal"){return (t.rec.dias||[]).includes(d.getDay());}
  if(t.rec.freq==="mensual"){
    if(t.rec.diasMes && t.rec.diasMes.length) return t.rec.diasMes.includes(d.getDate());
    if(t.rec.regla){const r=t.rec.regla; // "primer-lunes", "ultimo-viernes" …
      const partes=r.split("-"); if(partes.length!==2) return false;
      const ord=partes[0]; const diaNm=partes[1];
      const diaIdx=["domingo","lunes","martes","miercoles","jueves","viernes","sabado"].indexOf(diaNm);
      if(diaIdx<0) return false;
      if(d.getDay()!==diaIdx) return false;
      const ocurrencia=Math.ceil(d.getDate()/7); // 1..5
      if(ord==="primer") return ocurrencia===1;
      if(ord==="segundo") return ocurrencia===2;
      if(ord==="tercer") return ocurrencia===3;
      if(ord==="cuarto") return ocurrencia===4;
      if(ord==="ultimo"){const nx=new Date(d); nx.setDate(d.getDate()+7); return nx.getMonth()!==d.getMonth();}
    }
  }
  return false;
}
function taskDone(t, d){
  if(t.tipo==="eventual") return !!t.hechas;
  return !!(t.hechas && t.hechas[ymd(d)]);
}
function toggleTaskDone(t, d){
  if(t.tipo==="eventual"){t.hechas=!t.hechas;}
  else {if(!t.hechas) t.hechas={}; const k=ymd(d); if(t.hechas[k]) delete t.hechas[k]; else t.hechas[k]=true;}
}
function taskRecLabel(t){
  if(t.tipo==="eventual") return "Eventual";
  const r=t.rec||{};
  if(r.freq==="diaria") return "Diaria";
  if(r.freq==="semanal"){const ds=(r.dias||[]).slice().sort().map(i=>DAY_LBL[i]).join(" ");return "Sem · "+ds;}
  if(r.freq==="mensual"){
    if(r.diasMes && r.diasMes.length) return "Mes · día "+r.diasMes.join(", ");
    if(r.regla) return "Mes · "+r.regla.replace("-"," ");
  }
  return "Fija";
}

function tasksForOwner(ownerId){return STATE.tasks?STATE.tasks.filter(t=>t.ownerId===ownerId):[];}

/* tareas agrupadas por día para una ventana (Hoy / 7 días / 30 días) */
function tasksWindow(ownerId, mode){
  const list=tasksForOwner(ownerId);
  const today=new Date(); today.setHours(0,0,0,0);
  const days=[]; const span=mode==="hoy"?1:mode==="semana"?7:30;
  for(let i=0;i<span;i++){const d=new Date(today); d.setDate(today.getDate()+i); const arr=list.filter(t=>taskApplies(t,d));
    if(arr.length||mode==="hoy") days.push({d, arr});
  }
  return days;
}

          <button type="button" class="${recFreq==='mensual'?'on':''}" data-freq="mensual">Mensual</button>
        </div>
        ${recFreq==='semanal'?`<div class="days-grid">${[1,2,3,4,5,6,0].map(i=>`<button type="button" class="day-chk ${d.rec.dias.includes(i)?'on':''}" data-day="${i}">${DAY_LBL[i]}</button>`).join("")}</div><div style="font-size:11px;color:var(--faint);margin-top:6px">Elige uno o más días de la semana</div>`:''}
        ${recFreq==='mensual'?`<div class="frow"><div><label style="font-size:11.5px;font-weight:700;color:#46506B;margin-bottom:6px;display:block">Días fijos del mes</label><input id="r_diasMes" value="${d.rec.diasMes.join(', ')}" placeholder="Ej: 1, 15, 28"></div><div><label style="font-size:11.5px;font-weight:700;color:#46506B;margin-bottom:6px;display:block">O día variable</label><select id="r_regla"><option value="">— ninguna —</option><option value="primer-lunes" ${d.rec.regla==='primer-lunes'?'selected':''}>Primer lunes</option><option value="primer-viernes" ${d.rec.regla==='primer-viernes'?'selected':''}>Primer viernes</option><option value="ultimo-lunes" ${d.rec.regla==='ultimo-lunes'?'selected':''}>Último lunes</option><option value="ultimo-viernes" ${d.rec.regla==='ultimo-viernes'?'selected':''}>Último viernes</option><option value="ultimo-domingo" ${d.rec.regla==='ultimo-domingo'?'selected':''}>Último domingo</option></select></div></div><div style="font-size:11px;color:var(--faint);margin-top:6px">Usa una u otra; si pones días fijos, la regla se ignora.</div>`:''}
      </div>`;
    } else {
      recBlock=`<div class="field"><label>Fecha</label><input type="date" id="t_fecha" value="${d.fecha||ymd(new Date())}"></div>`;
    }
    return `<div class="modal-head"><div><h3>${isNew?"Nueva tarea":"Editar tarea"}</h3><div class="hsub">${d.tipo==='fija'?'Tarea recurrente':'Tarea eventual'}</div></div><button class="xclose" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="field"><label>Título de la tarea</label><input id="t_titulo" value="${esc(d.titulo)}" placeholder="Ej. Revisar correos pendientes" autofocus></div>
      <div class="field"><label>Tipo</label><div class="seg"><button type="button" class="${d.tipo==='fija'?'on':''}" data-tipo="fija">Fija (recurrente)</button><button type="button" class="${d.tipo==='eventual'?'on':''}" data-tipo="eventual">Eventual</button></div></div>
      ${recBlock}
      <div class="frow"><div class="field"><label>Hora (opcional)</label><input type="time" id="t_hora" value="${esc(d.hora||'')}"></div>
        <div class="field"><label>¿En conflicto con proyectos?</label><select id="t_conflicto"><option value="no" ${!d.conflicto?'selected':''}>No</option><option value="si" ${d.conflicto?'selected':''}>Sí, marcarla</option></select></div></div>
      <div class="field"><label>Notas (opcional)</label><textarea id="t_notas" placeholder="Detalle, contexto…">${esc(d.notas||'')}</textarea></div>
    </div><div class="modal-foot">${!isNew?`<button class="btn btn-line" id="t_del" style="margin-right:auto;color:var(--red)">Eliminar</button>`:''}<button class="btn btn-line" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="t_save">${isNew?"Crear tarea":"Guardar"}</button></div>`;};
  showModal(body());
  function collect(){
    d.titulo=val("t_titulo");d.hora=val("t_hora");d.conflicto=val("t_conflicto")==="si";d.notas=val("t_notas");
    if(d.tipo==="eventual"){d.fecha=val("t_fecha")||ymd(new Date());}
    else {
      if(d.rec.freq==="mensual"){
        const dm=val("r_diasMes");d.rec.diasMes=dm?dm.split(",").map(s=>parseInt(s.trim())).filter(n=>n>=1&&n<=31):[];
        d.rec.regla=val("r_regla")||"";
      }
    }
  }
  function rerender(){collect();showModal(body());bind();}
  function bind(){
    // Delegación de eventos: un solo listener en el modal raíz.
    // Sobrevive a re-renders del contenido y evita botones "muertos".
    const modal = document.querySelector(".modal");
    if(!modal) return;
    modal.onclick = (ev) => {
      // botones del tipo (fija/eventual)
      const tipoBtn = ev.target.closest("[data-tipo]");
      if(tipoBtn && modal.contains(tipoBtn)){
        collect();
        d.tipo = tipoBtn.dataset.tipo;
        rerender();
        return;
      }
      // botones de frecuencia (diaria/semanal/mensual)
      const freqBtn = ev.target.closest("[data-freq]");
      if(freqBtn && modal.contains(freqBtn)){
        collect();
        d.rec.freq = freqBtn.dataset.freq;
        if(!d.rec.dias) d.rec.dias = [];
        if(!d.rec.diasMes) d.rec.diasMes = [];
        rerender();
        return;
      }
      // botones de días de la semana
      const dayBtn = ev.target.closest("[data-day]");
      if(dayBtn && modal.contains(dayBtn)){
        collect();
        const i = +dayBtn.dataset.day;
        if(!d.rec.dias) d.rec.dias = [];
        if(d.rec.dias.includes(i)) d.rec.dias = d.rec.dias.filter(x => x !== i);
        else d.rec.dias.push(i);
        rerender();
        return;
      }
      // Guardar
      if(ev.target.closest("#t_save")){
        collect();
        if(!d.titulo.trim()){ toast("Pon un título"); return; }
        if(d.tipo === "fija" && d.rec.freq === "semanal" && !d.rec.dias.length){
          toast("Elige al menos un día"); return;
        }
        if(!STATE.tasks) STATE.tasks = [];
        if(isNew) STATE.tasks.push(d);
        else { const i = STATE.tasks.findIndex(x => x.id === d.id); STATE.tasks[i] = d; }
        save(); closeModal(); render();
        toast(isNew ? "Tarea creada" : "Tarea actualizada");
        return;
      }
      // Eliminar (solo edición)
      if(ev.target.closest("#t_del")){
        if(confirm("¿Eliminar esta tarea?")){
          STATE.tasks = STATE.tasks.filter(x => x.id !== d.id);
          save(); closeModal(); render(); toast("Tarea eliminada");
        }
        return;
      }
    };
  }
  bind();
}

function render(){
  renderTopbar();
  // protección por rol: si un responsable cae en vista ejecutiva, lo mandamos a su panel
  if(ME&&!canSeeExec()&&(VIEW==="dash"||VIEW==="proy"||VIEW==="aprob"||VIEW==="equipo"))VIEW="mipanel";

  if(!ME&&(VIEW==="mihoja"||VIEW==="mipanel"||VIEW==="aprob"||VIEW==="equipo"))VIEW="dash";
  ({dash:renderDash,proy:renderProy,mihoja:renderMiHoja,equipo:renderEquipo,aprob:renderAprob,mipanel:renderMiPanel}[VIEW]||renderDash)();
}

  const bars=withDates.length?withDates.map(({p,c})=>`<div class="barrow"><div class="bl"><span class="nm">${esc(p.nombre)}</span><span class="pc">${c.avance}% / ${c.esperado}%</span></div><div class="track"><div class="fill" style="width:0" data-w="${c.avance}%;background:${barColor(c.risk)}"></div><div class="expected" style="left:${c.esperado}%"></div></div></div>`).join(""):`<p style="color:var(--faint);font-size:13px">Aún no hay proyectos con fecha de término definida.</p>`;

  // por fuente
  const fmap={};ps.forEach(x=>{(fmap[x.p.fuente]=fmap[x.p.fuente]||[]).push(x);});
  const fpal=["#2F6BFF","#7A4FD0","#15A34A","#E89611","#E0245A","#0EA5A5","#C9A227","#5A6580"];
  const fuenteHTML=Object.entries(fmap).sort((a,b)=>b[1].length-a[1].length).map(([f,arr],i)=>{const av=Math.round(arr.reduce((s,x)=>s+x.c.avance,0)/arr.length);return `<div class="frow2"><span class="fn" title="${esc(f)}">${esc(f)}</span><span class="ft"><i style="width:${Math.round(arr.length/total*100)}%;background:${fpal[i%fpal.length]}"></i></span><span class="fc">${arr.length} · ${av}%</span></div>`;}).join("");

  // por persona
  const pmap={};ps.forEach(x=>{if(x.p.ownerId)(pmap[x.p.ownerId]=pmap[x.p.ownerId]||[]).push(x);});
  const personaHTML=Object.entries(pmap).map(([id,arr])=>{const per=person(id);const act=arr.filter(x=>x.p.status!=="Cancelado");const av=act.length?Math.round(act.reduce((s,x)=>s+x.c.avance,0)/act.length):0;return `<div class="frow2"><span class="fn" title="${esc(disp(per))}">${esc(disp(per))}</span><span class="ft"><i style="width:${av}%;background:linear-gradient(90deg,var(--blue),#5C8BFF)"></i></span><span class="fc">${arr.length} · ${av}%</span></div>`;}).join("");

  const riesgos=ps.filter(x=>x.c.risk==="r-late"||x.c.risk==="r-warn").sort((a,b)=>order[a.c.risk]-order[b.c.risk]);
  const riesgoList=riesgos.length?riesgos.map(({p,c})=>`<div class="alert-card" style="${c.risk==='r-warn'?'background:var(--amber-soft);border-color:#ECDDA8':''}"><span class="rdot ${c.risk}" style="margin-top:3px"></span><div><div class="nm" style="${c.risk==='r-warn'?'color:#7A5E0A':''}">${esc(p.nombre)}</div><div class="ds" style="${c.risk==='r-warn'?'color:#8A6A12':''}">${alertMsg(p,c)}</div></div></div>`).join(""):`<div class="empty" style="padding:28px"><div class="big" style="font-size:16px">✓ Todo en tiempo</div><p style="font-size:13px">Ningún proyecto en riesgo ahora mismo.</p></div>`;

  // resumen de solicitudes (solo si hay y eres admin)

  const reqBanner=(ME&&ME.admin&&reqs.length)?`<div class="hint" style="background:#FFF0F3;color:#B01646;border:1px solid #F6C9D7;cursor:pointer" id="goAprob"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/></svg>Tienes ${reqs.length} solicitud${reqs.length!==1?'es':''} pendiente${reqs.length!==1?'s':''} de aprobación · clic para revisar</div>`:"";

function alertMsg(p,c){
  const resp=disp(person(p.ownerId));
  if(c.vencido){const term=isDate(p.termino)?fmtD(p.termino):p.termino;return `🔴 Vencido (término ${term}) y va al ${c.avance}%. Resp.: ${esc(resp)}`;}
  if(c.termText)return `Avance ${c.avance}% · término: ${esc(c.termText)} · Resp.: ${esc(resp)}`;
  return `Va al ${c.avance}% (debería ${c.esperado}%)${c.rest!==null?`, vence ${fmtD(p.termino)} · faltan ${c.rest} días`:''} · Resp.: ${esc(resp)}`;
}
function makeDonut(segs,total){const R=58,C=2*Math.PI*R;let off=0;const arcs=total?segs.map(s=>{const len=s[1]/total*C;const el=`<circle r="${R}" cx="80" cy="80" fill="none" stroke="${s[2]}" stroke-width="20" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 80 80)"/>`;off+=len;return el;}).join(""):`<circle r="${R}" cx="80" cy="80" fill="none" stroke="var(--line-2)" stroke-width="20"/>`;return `<svg width="160" height="160" viewBox="0 0 160 160" style="flex:none">${arcs}<text x="80" y="74" text-anchor="middle" font-family="var(--font-d)" font-weight="700" font-size="34" fill="var(--ink)">${total}</text><text x="80" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="var(--muted)">PROYECTOS</text></svg>`;}
function animFills(){requestAnimationFrame(()=>document.querySelectorAll(".fill[data-w]").forEach(f=>{const[w,bg]=f.dataset.w.split(";");f.style.cssText="width:"+w+";"+(bg||"");}));}

function projectCard(p,c,i){
  const fuente=`<span class="fuente-tag"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2 2 7l10 5 10-5z"/><path d="M2 17l10 5 10-5M2 12l10 5 10-5"/></svg>${esc(p.fuente)}</span>`;
  const mod=p.modalidad==="grupo"?`<span class="modbadge m-grp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>Grupo · ${p.integrantes.length}</span>`:`<span class="modbadge m-ind"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/></svg>Individual</span>`;
  const days=c.termText?`<span class="days">${esc(c.termText)}</span>`:(c.rest!==null?`<span class="days ${c.vencido?'over':''}">${c.vencido?'Vencido hace <b>'+Math.abs(c.rest)+'</b>':'<b>'+c.rest+'</b> días rest.'}</span>`:`<span class="days">Sin fechas</span>`);
  const nota=p.nota?`<div class="nota">"${esc(p.nota)}"</div>`:`<div class="nota empty">Sin nota de avance</div>`;
  const flags=[];
  if(pend(p.ayuda))flags.push(`<span class="flag help pulse"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M12 2 2 7v7c0 5 4 8 10 9 6-1 10-4 10-9V7z"/><path d="M12 8v4M12 16h.01"/></svg>Pidió ayuda</span>`);
  if(pend(p.prorroga))flags.push(`<span class="flag ext"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>Prórroga solicitada</span>`);
  if(pend(p.cancelacion))flags.push(`<span class="flag canc pulse"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="9"/><path d="M15 9l-6 6M9 9l6 6"/></svg>Cancelación pendiente</span>`);
  const flagsHTML=flags.length?`<div class="flags">${flags.join("")}</div>`:"";
  return `<div class="pcard" data-id="${p.id}" style="animation-delay:${i*35}ms"><div class="risk-edge" style="background:${riskEdge(c.risk)}"></div>
    <div class="top"><div class="ttl">${esc(p.nombre)}</div>${mod}</div>
    <div class="meta-row">${fuente}<span class="chip"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M4 21v-1a6 6 0 0 1 12 0v1"/></svg>${esc(person(p.ownerId)?disp(person(p.ownerId)):'Sin asignar')}</span></div>
    ${flagsHTML}
    ${nota}
    <div class="prog"><div class="pl"><span class="a">Avance ${c.avance}%${c.nHitos?` · ${c.hechos}/${c.nHitos} hitos`:''}</span>${c.esperado!==null?`<span class="e">Esperado ${c.esperado}%</span>`:''}</div><div class="track"><div class="fill" data-w="${c.avance}%;background:${barColor(c.risk)}" style="width:0"></div>${c.esperado!==null?`<div class="expected" style="left:${c.esperado}%"></div>`:''}</div></div>
    <div class="foot"><span class="estado ${sCls(c.status)}"><span class="d"></span>${esc(c.status)}</span>${days}</div></div>`;
}

  app.innerHTML=`<div class="view"><div class="page-head"><div><h2>Proyectos</h2><div class="sub">${list.length} de ${STATE.projects.length} proyectos</div></div></div>${hint}
    <div class="toolbar">
      <div class="search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input id="fq" placeholder="Buscar proyecto, responsable, fuente…" value="${esc(F.q)}"></div>

  const foot=editable?`<button class="btn btn-line" onclick="closeModal()" style="margin-right:auto">Cerrar</button><button class="btn btn-soft" id="dEdit">Editar datos / hitos</button><button class="btn btn-primary" id="dNota">Actualizar nota</button>`:`<button class="btn btn-line" onclick="closeModal()">Cerrar</button>`;

  // resolución de solicitudes (admin)
  document.querySelectorAll("[data-act]").forEach(b=>b.onclick=()=>resolveReq(p,b.dataset.act));

/* ============ SOLICITAR (responsable) ============ */
function openRequest(p,tipo){
  const cfg={
    prorroga:{t:"Solicitar prórroga",sub:"La aprueba Dirección",ph:"¿Por qué necesitas más tiempo?",fecha:true},
    ayuda:{t:"Pedir ayuda a Gerencia",sub:"Marca el proyecto para apoyo",ph:"¿Qué está trabando el proyecto? ¿Qué necesitas?",fecha:false},
    cancelacion:{t:"Solicitar cancelación",sub:"Solo Dirección puede aprobarla",ph:"¿Por qué debería cancelarse este proyecto?",fecha:false}
  }[tipo];
  showModal(`<div class="modal-head"><div><h3>${cfg.t}</h3><div class="hsub">${esc(p.nombre)} · ${cfg.sub}</div></div><button class="xclose" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      ${cfg.fecha?`<div class="field"><label>Nueva fecha de término propuesta</label><input type="date" id="rFecha" value="${isDate(p.termino)?p.termino:''}"></div>`:''}
      <div class="field"><label>Motivo</label><textarea id="rMotivo" placeholder="${cfg.ph}" autofocus></textarea></div>
    </div><div class="modal-foot"><button class="btn btn-line" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="rSend">Enviar solicitud</button></div>`);
  document.getElementById("rSend").onclick=()=>{
    const motivo=val("rMotivo").trim();if(!motivo){toast("Escribe el motivo");return;}
    if(tipo==="prorroga"){const nf=val("rFecha");if(!nf){toast("Indica la nueva fecha");return;}p.prorroga={nuevaFecha:nf,motivo,fecha:fmtNow(),estado:"pendiente",porId:ME.id};}
    if(tipo==="ayuda")p.ayuda={motivo,fecha:fmtNow(),estado:"pendiente",porId:ME.id};
    if(tipo==="cancelacion")p.cancelacion={motivo,fecha:fmtNow(),estado:"pendiente",porId:ME.id};
    save();closeModal();render();
    toast(tipo==="ayuda"?"Ayuda solicitada a Gerencia":tipo==="prorroga"?"Prórroga enviada a Dirección":"Cancelación enviada a Dirección");
  };
}

/* ============ RESOLVER (admin) ============ */
function resolveReq(p,act){
  if(!ME||!ME.admin)return;
  if(act==="prorroga-ok"){p.termino=p.prorroga.nuevaFecha;p.prorroga={...p.prorroga,estado:"aprobada"};toast("Prórroga aprobada · fecha actualizada");}
  if(act==="prorroga-no"){p.prorroga={...p.prorroga,estado:"rechazada"};toast("Prórroga rechazada");}
  if(act==="ayuda-ok"){p.ayuda={...p.ayuda,estado:"aprobada"};toast("Marcado como atendido");}
  if(act==="canc-ok"){if(confirm("¿Aprobar la cancelación y RETIRAR el proyecto del sistema? Esta acción no se puede deshacer.")){STATE.projects=STATE.projects.filter(x=>x.id!==p.id);save();closeModal();render();toast("Proyecto cancelado y retirado");return;}else return;}
  if(act==="canc-no"){p.cancelacion={...p.cancelacion,estado:"rechazada"};toast("Cancelación rechazada · proyecto se mantiene");}
  save();closeModal();render();
}

/* ============ BANDEJA DE APROBACIONES (admin) ============ */
function renderAprob(){
  if(!ME||!ME.admin){VIEW="dash";return render();}
  const reqs=pendingReqs();
  const meta={prorroga:{cls:"t-ext",typ:"ext",label:"Prórroga"},ayuda:{cls:"t-help",typ:"help",label:"Pidió ayuda"},cancelacion:{cls:"t-canc",typ:"canc",label:"Cancelación"}};
  const cards=reqs.length?reqs.map(({tipo,p,req})=>{
    const m=meta[tipo];const who=disp(person(req.porId)||person(p.ownerId));
    let body="",btns="";
    if(tipo==="prorroga"){body=`Nueva fecha propuesta: <b>${fmtD(req.nuevaFecha)}</b><br>${esc(req.motivo)}`;btns=`<button class="btn btn-primary" data-r="${p.id}|prorroga-ok">Aprobar y mover fecha</button><button class="btn btn-line" data-r="${p.id}|prorroga-no" style="color:var(--red)">Rechazar</button>`;}
    if(tipo==="ayuda"){body=esc(req.motivo);btns=`<button class="btn btn-primary" data-r="${p.id}|ayuda-ok">Marcar atendido</button>`;}
    if(tipo==="cancelacion"){body=esc(req.motivo);btns=`<button class="btn btn-line" data-r="${p.id}|canc-ok" style="color:#fff;background:var(--red)">Aprobar y retirar</button><button class="btn btn-line" data-r="${p.id}|canc-no">No cancelar</button>`;}
    return `<div class="appr-card ${m.cls}"><div class="ah"><span class="typ ${m.typ}">${m.label}</span><span class="pn">${esc(p.nombre)}</span><span class="who2">· solicitó ${esc(who)} · ${fmtD(req.fecha)}</span></div><div class="body2">${body}</div><div class="arow">${btns}</div></div>`;
  }).join(""):`<div class="empty"><svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="var(--green)" stroke-width="1.6"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg><div class="big">Sin solicitudes pendientes</div><p>Cuando alguien pida prórroga, ayuda o cancelación, aparecerá aquí.</p></div>`;
  app.innerHTML=`<div class="view"><div class="page-head"><div><h2>Aprobaciones</h2><div class="sub">${reqs.length} solicitud${reqs.length!==1?'es':''} pendiente${reqs.length!==1?'s':''} · solo Dirección decide</div></div></div><div>${cards}</div></div>`;
  document.querySelectorAll("[data-r]").forEach(b=>b.onclick=()=>{const[id,act]=b.dataset.r.split("|");const p=STATE.projects.find(x=>x.id===id);if(p)resolveReq(p,act);});
}

/* ============ REPORTAR AVANCE ============ */
function openProgress(p){
  const c=calc(p);
  showModal(`<div class="modal-head"><div><h3>Actualizar nota / estado</h3><div class="hsub">${esc(p.nombre)} · avance ${c.avance}% (${c.hechos}/${c.nHitos} hitos)</div></div><button class="xclose" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="field"><label>Nota de avance</label><textarea id="pNota" placeholder="¿Qué se hizo? ¿Qué falta? Ej: 'En espera de hoja de seguridad…'">${esc(p.nota||"")}</textarea></div>
      <div class="field"><label>Estado manual (opcional)</label><select id="pStatus"><option value="auto" ${(p.status!=="En pausa"&&p.status!=="Cancelado")?'selected':''}>Automático (según hitos: ${esc(c.status)})</option><option value="En pausa" ${p.status==="En pausa"?'selected':''}>En pausa</option><option value="Cancelado" ${p.status==="Cancelado"?'selected':''}>Cancelado</option></select><div style="font-size:11.5px;color:var(--faint);margin-top:6px">El avance % lo definen los hitos. Aquí solo puedes pausar o cancelar manualmente.</div></div>
    </div><div class="modal-foot"><button class="btn btn-line" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="pSave">Guardar</button></div>`);
  document.getElementById("pSave").onclick=()=>{
    p.nota=val("pNota");
    const st=val("pStatus");
    p.status = st==="auto" ? "En proceso" : st;  // "auto" lo recalcula calc(); guardamos un valor neutro

  };
}

/* ============ CREAR / EDITAR ============ */
function openForm(p){

  const d=p?JSON.parse(JSON.stringify(p)):{id:"p"+Date.now(),nombre:"",fuente:CONFIG.FUENTES[0],modalidad:"individual",ownerId:owner,revisor:CONFIG.REVISORES[0],integrantes:[],hitos:[],inicio:"",termino:"",status:"Sin comenzar",nota:"",obs:"",ayuda:null,prorroga:null,cancelacion:null};
  if(!d.hitos)d.hitos=[];
  let termMode = isDate(d.termino)||d.termino===""?"fecha":"texto";
  const integrantesNombres=()=>d.integrantes.map(t=>t.integrante).filter(Boolean);
  const body=()=>`<div class="modal-head"><span class="glow"></span><div><h3>${isNew?"Nuevo proyecto":"Editar proyecto"}</h3><div class="hsub">${isNew?"Da de alta una acción o proyecto en tu hoja":"Modifica los datos"}</div></div><button class="xclose" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="field"><label>Nombre del proyecto / acción</label><input id="f_nombre" value="${esc(d.nombre)}" placeholder="Ej. Difusión del manual de cultura"></div>

        <div class="field"><label>Responsable de revisión</label><select id="f_rev">${CONFIG.REVISORES.map(r=>`<option ${d.revisor===r?'selected':''}>${esc(r)}</option>`).join("")}</select></div></div>
      <div class="field"><label>Modalidad</label><div class="seg"><button type="button" class="${d.modalidad==='individual'?'on':''}" data-mod="individual">Individual</button><button type="button" class="${d.modalidad==='grupo'?'on':''}" data-mod="grupo">Grupo</button></div></div>

      ${d.modalidad==='grupo'?`<div class="field"><label>Integrantes y su responsabilidad</label><div class="tasks" id="taskBox">${d.integrantes.map((t,i)=>`<div class="task"><input value="${esc(t.integrante)}" data-ti="${i}" data-tf="integrante" placeholder="Integrante"><input value="${esc(t.responsabilidad||'')}" data-ti="${i}" data-tf="responsabilidad" placeholder="Responsabilidad"><button class="trash" data-trash="${i}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button></div>`).join("")}</div><button class="addtask" id="addInt"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="width:15px;height:15px"><path d="M12 5v14M5 12h14"/></svg>Agregar integrante</button></div>`:''}
      <div class="field"><label>Hitos del proyecto <span style="color:var(--faint);font-weight:500">· el avance se calcula con esto</span></label><div class="tasks" id="hitoBox">${d.hitos.map((h,i)=>`<div class="task"><input value="${esc(h.texto)}" data-hi="${i}" data-hf="texto" placeholder="Paso o entregable. Ej: Cotizar proveedores" style="flex:2">${d.modalidad==='grupo'?`<select data-hi="${i}" data-hf="quien" style="flex:1;padding:9px 11px;border-radius:9px;border:1px solid var(--line);background:#fff"><option value="">— Quién —</option>${integrantesNombres().map(n=>`<option ${h.quien===n?'selected':''}>${esc(n)}</option>`).join("")}</select>`:''}<button class="trash" data-htrash="${i}"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 6h18M8 6V4h8v2M19 6l-1 14H6L5 6"/></svg></button></div>`).join("")}</div><button class="addtask" id="addHito"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="width:15px;height:15px"><path d="M12 5v14M5 12h14"/></svg>Agregar hito</button></div>
      <div class="frow"><div class="field"><label>Fecha de inicio</label><input type="date" id="f_ini" value="${isDate(d.inicio)?d.inicio:''}"></div>
        <div class="field"><label>Fecha / periodicidad de término</label><div class="term-toggle"><button type="button" data-term="fecha" class="${termMode==='fecha'?'on':''}">Fecha</button><button type="button" data-term="texto" class="${termMode==='texto'?'on':''}">Texto / recurrente</button></div>${termMode==='fecha'?`<input type="date" id="f_fin" value="${isDate(d.termino)?d.termino:''}">`:`<input id="f_fin" value="${esc(isDate(d.termino)?'':d.termino)}" placeholder="Ej. Continuo, Mensual, 2 eventos al año">`}</div></div>
      <div class="field"><label>Nota de avance</label><textarea id="f_nota" placeholder="Estado actual, pendientes…">${esc(d.nota)}</textarea></div>
      <div class="field"><label>Observaciones</label><textarea id="f_obs" placeholder="Normas, dependencias…">${esc(d.obs)}</textarea></div>
    </div><div class="modal-foot"><button class="btn btn-line" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="saveProj">${isNew?"Crear proyecto":"Guardar cambios"}</button></div>`;
  showModal(body());
  function collect(){d.nombre=val("f_nombre");d.fuente=val("f_fuente");d.revisor=val("f_rev");if(document.getElementById("f_owner"))d.ownerId=val("f_owner");d.inicio=val("f_ini");d.termino=val("f_fin");d.nota=val("f_nota");d.obs=val("f_obs");
    if(d.modalidad==='grupo'){const box=document.getElementById("taskBox");if(box){const arr=[];box.querySelectorAll(".task").forEach(t=>{const ins=t.querySelectorAll("input");arr[+ins[0].dataset.ti]={integrante:ins[0].value,responsabilidad:ins[1].value};});d.integrantes=arr.filter(x=>x&&x.integrante.trim());}}
    const hb=document.getElementById("hitoBox");if(hb){const arr=[];hb.querySelectorAll(".task").forEach((t,idx)=>{const tx=t.querySelector("[data-hf='texto']");const q=t.querySelector("[data-hf='quien']");const old=d.hitos[+tx.dataset.hi]||{};arr[+tx.dataset.hi]={id:old.id||("h"+Date.now()+idx),texto:tx.value,quien:q?q.value:(old.quien||""),hecho:old.hecho||false};});d.hitos=arr.filter(x=>x&&x.texto.trim());}}
  function rerender(){collect();showModal(body());bind();}
  function bind(){
    document.querySelectorAll("[data-mod]").forEach(b=>b.onclick=()=>{d.modalidad=b.dataset.mod;rerender();});
    document.querySelectorAll("[data-term]").forEach(b=>b.onclick=()=>{collect();termMode=b.dataset.term;d.termino="";showModal(body());bind();});
    const add=document.getElementById("addInt");if(add)add.onclick=()=>{collect();d.integrantes.push({integrante:"",responsabilidad:""});showModal(body());bind();};
    document.querySelectorAll("[data-trash]").forEach(b=>b.onclick=()=>{collect();d.integrantes.splice(+b.dataset.trash,1);showModal(body());bind();});
    const addH=document.getElementById("addHito");if(addH)addH.onclick=()=>{collect();d.hitos.push({id:"h"+Date.now(),texto:"",quien:"",hecho:false});showModal(body());bind();};
    document.querySelectorAll("[data-htrash]").forEach(b=>b.onclick=()=>{collect();d.hitos.splice(+b.dataset.htrash,1);showModal(body());bind();});
    document.getElementById("saveProj").onclick=doSave;
  }
  function doSave(){collect();if(!d.nombre.trim()){toast("Pon un nombre");return;}if(isNew)STATE.projects.push(d);else{const i=STATE.projects.findIndex(x=>x.id===d.id);STATE.projects[i]=d;}save();closeModal();render();toast(isNew?"Proyecto creado":"Cambios guardados");}
  bind();
}

}

/* ============ REPORTE ============ */
function openReport(){
  const ps=STATE.projects.map(p=>({p,c:calc(p)}));
  const total=ps.length, real=ps.filter(x=>x.p.status==="Concluido").length;
  const act=ps.filter(x=>x.p.status!=="Cancelado");
  const gAvg=act.length?Math.round(act.reduce((s,x)=>s+x.c.avance,0)/act.length):0;
  const late=ps.filter(x=>x.c.risk==="r-late");
  const fecha=new Date().toLocaleDateString("es-MX",{day:"2-digit",month:"long",year:"numeric"});
  const hora=new Date().toLocaleTimeString("es-MX",{hour:"2-digit",minute:"2-digit"});
  const order={"r-late":0,"r-warn":1,"r-ok":2,"r-done":3,"r-pause":4,"r-cancel":5};
  const rows=[...ps].sort((a,b)=>order[a.c.risk]-order[b.c.risk]).map(({p,c})=>`<tr><td><span class="rdot ${c.risk}" style="display:inline-block;vertical-align:middle;margin-right:7px"></span><b>${esc(p.nombre)}</b></td><td>${esc(disp(person(p.ownerId)))}</td><td style="font-size:11px">${esc(p.fuente)}</td><td>${esc(p.status)}</td><td><span class="mini-bar"><i style="width:${c.avance}%;background:${barColor(c.risk)}"></i></span> ${c.avance}%</td><td>${c.termText?esc(c.termText):c.rest!==null?(c.vencido?'<span style="color:var(--red);font-weight:700">vencido</span>':c.rest+' d'):'—'}</td></tr>`).join("");
  const byRev={};ps.forEach(x=>{(byRev[x.p.revisor]=byRev[x.p.revisor]||[]).push(x);});
  const revBlocks=Object.entries(byRev).map(([rev,arr])=>{const a2=arr.filter(x=>x.p.status!=="Cancelado");const avg=a2.length?Math.round(a2.reduce((s,x)=>s+x.c.avance,0)/a2.length):0;return `<div style="display:flex;justify-content:space-between;align-items:center;padding:11px 14px;background:var(--surface-2);border:1px solid var(--line-2);border-radius:11px;margin-bottom:8px"><div><b style="font-size:13.5px">${esc(rev)}</b><span style="color:var(--muted);font-size:12px;margin-left:8px">${arr.length} proyecto${arr.length>1?"s":""}</span></div><div style="font-family:var(--font-d);font-weight:700;color:var(--blue-d)">${avg}% prom.</div></div>`;}).join("");
  const alerts=late.length?late.map(({p,c})=>`<div class="alert-card"><span class="rdot r-late" style="margin-top:3px"></span><div><div class="nm">${esc(p.nombre)}</div><div class="ds">${c.vencido?"Vencido · ":""}Avance ${c.avance}%${c.esperado!==null?' (esperado '+c.esperado+'%)':''} · Resp.: ${esc(disp(person(p.ownerId)))} · Revisa: ${esc(p.revisor)}</div></div></div>`).join(""):`<p style="color:var(--green);font-weight:600;font-size:14px">✓ Ningún proyecto en estado crítico.</p>`;
  showModal(`<div class="modal-head no-print"><div><h3>Reporte ejecutivo</h3><div class="hsub">Vista previa · listo para imprimir o PDF</div></div><button class="xclose" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body" style="max-height:68vh">
      <div class="report-head"><div><div class="rt">Revisión de Status</div><div class="rd">Gestión de Proyectos · Recouromex 2026</div></div><div class="stamp">Generado<br><b style="color:var(--text);font-size:14px">${fecha}</b><br>${hora} hrs</div></div>
      <div class="kpis" style="grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:8px">
        <div class="kpi tone-ink" style="padding:14px"><div class="val" style="font-size:26px">${total}</div><div class="lbl">Totales</div></div>
        <div class="kpi tone-green" style="padding:14px"><div class="val" style="font-size:26px">${real}</div><div class="lbl">Concluidos</div></div>
        <div class="kpi tone-gold" style="padding:14px"><div class="val" style="font-size:26px">${gAvg}%</div><div class="lbl">Avance global</div></div>
        <div class="kpi tone-red" style="padding:14px"><div class="val" style="font-size:26px">${late.length}</div><div class="lbl">En riesgo</div></div></div>
      <div class="rsec">Detalle por proyecto</div>
      <table class="rtable"><thead><tr><th>Proyecto</th><th>Responsable</th><th>Fuente</th><th>Status</th><th>Avance</th><th>Término</th></tr></thead><tbody>${rows}</tbody></table>
      <div class="rsec">Avance por responsable de revisión</div>${revBlocks}
      <div class="rsec">Puntos de atención</div>${alerts}
    </div><div class="modal-foot no-print"><button class="btn btn-line" onclick="closeModal()">Cerrar</button><button class="btn btn-gold" onclick="window.print()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M6 9V2h12v7M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2M6 14h12v8H6z"/></svg>Imprimir / PDF</button></div>`);
}

/* ============ MODAL + UTILS ============ */
const mr=document.getElementById("modalRoot");
function showModal(html){const sm=html.includes('sm-x');mr.innerHTML=`<div class="scrim" onclick="if(event.target===this)closeModal()"><div class="modal${sm?' sm':''}">${sm?'':html}</div></div>`;if(!sm)mr.querySelector(".modal").innerHTML=html;document.body.style.overflow="hidden";}
function closeModal(){mr.innerHTML="";document.body.style.overflow="";}
function toast(m){const t=document.getElementById("toast");t.innerHTML=`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M20 6 9 17l-5-5"/></svg>${esc(m)}`;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),2400);}
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeModal();});

/* ARRANQUE */
(async function(){await load();render();startPolling();})();
</script>
</body>
</html>
