<style>
:root{

*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}

button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
::selection{background:var(--blue);color:#fff}
.topbar{position:sticky;top:0;z-index:50;background:linear-gradient(100deg,var(--ink),var(--navy) 55%,var(--navy2));color:#fff;padding:14px clamp(16px,4vw,40px);display:flex;align-items:center;gap:18px;box-shadow:0 10px 30px rgba(10,24,52,.28);}

.topbar .spacer{flex:1}
.nav{display:flex;gap:4px;background:rgba(255,255,255,.07);padding:4px;border-radius:12px}
.nav button{padding:8px 16px;border-radius:9px;font-weight:600;font-size:13.5px;color:#C6D2F2;transition:.18s;white-space:nowrap;}
.nav button.active{background:#fff;color:var(--ink);box-shadow:var(--sh-sm)}
.nav button:not(.active):hover{color:#fff;background:rgba(255,255,255,.06)}
.tb-actions{display:flex;align-items:center;gap:10px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:10px 17px;border-radius:11px;font-weight:600;font-size:13.5px;transition:.16s;white-space:nowrap;}
.btn svg{width:16px;height:16px}

.btn-primary{background:var(--blue);color:#fff;box-shadow:0 6px 18px rgba(47,107,255,.42)}
.btn-primary:hover{background:var(--blue-d);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.1);color:#fff}
.btn-ghost:hover{background:rgba(255,255,255,.18)}
.btn-soft{background:var(--blue-soft);color:var(--blue-d)}
.btn-soft:hover{background:#DCE7FF}
.btn-line{background:#fff;color:var(--text);box-shadow:inset 0 0 0 1px var(--line);}
.btn-line:hover{background:var(--surface-2)}
.lock{width:42px;height:42px;border-radius:11px;display:grid;place-items:center;background:rgba(255,255,255,.1);transition:.16s;position:relative;}
.lock:hover{background:rgba(255,255,255,.2)}
.lock.open{background:var(--green);box-shadow:0 6px 16px rgba(21,163,74,.5)}
.lock svg{width:18px;height:18px}
.sync{font-size:11px;color:#9FB2DF;display:flex;align-items:center;gap:6px;font-weight:500}
.sync .pip{width:7px;height:7px;border-radius:50%;background:#5C8BFF;box-shadow:0 0 0 3px rgba(92,139,255,.25)}
.sync.saved .pip{background:var(--green);box-shadow:0 0 0 3px rgba(21,163,74,.25)}
.sync.local .pip{background:var(--gold)}
.wrap{max-width:1320px;margin:0 auto;padding:clamp(20px,3vw,34px) clamp(16px,4vw,40px) 64px}
.view{animation:rise .45s cubic-bezier(.2,.7,.3,1) both}
@keyframes rise{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.page-head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px;margin-bottom:22px;flex-wrap:wrap}

.kpi{background:var(--surface);border-radius:var(--r);padding:20px 20px 18px;box-shadow:var(--sh-sm);position:relative;overflow:hidden;border:1px solid var(--line-2);transition:.2s;animation:rise .5s both;}
.kpi:hover{box-shadow:var(--sh);transform:translateY(-2px)}

.kpi .ic svg{width:19px;height:19px}
.kpi .val{font-family:var(--font-d);font-weight:700;font-size:34px;line-height:1;letter-spacing:-1px}
.kpi .lbl{color:var(--muted);font-size:12.5px;font-weight:600;margin-top:6px;letter-spacing:.2px}
.kpi .accent{position:absolute;right:-18px;top:-18px;width:80px;height:80px;border-radius:50%;opacity:.06}
.tone-blue .ic{background:var(--blue-soft);color:var(--blue-d)} .tone-blue .accent{background:var(--blue)}
.tone-green .ic{background:var(--green-soft);color:var(--green)} .tone-green .accent{background:var(--green)}
.tone-amber .ic{background:var(--amber-soft);color:var(--amber)} .tone-amber .accent{background:var(--amber)}
.tone-red .ic{background:var(--red-soft);color:var(--red)} .tone-red .accent{background:var(--red)}
.tone-ink .ic{background:#E7ECF7;color:var(--ink)} .tone-ink .accent{background:var(--ink)}
.tone-gold .ic{background:var(--gold-soft);color:#9A7B12} .tone-gold .accent{background:var(--gold)}
.grid-2{display:grid;grid-template-columns:1.15fr 1fr;gap:18px;margin-bottom:18px}
@media(max-width:900px){.grid-2{grid-template-columns:1fr}}
.panel{background:var(--surface);border-radius:var(--r);padding:22px;box-shadow:var(--sh-sm);border:1px solid var(--line-2)}
.panel h3{font-family:var(--font-d);font-weight:700;font-size:16px;letter-spacing:-.2px;margin-bottom:2px}
.panel .ph-sub{color:var(--faint);font-size:12px;font-weight:500;margin-bottom:18px}
.donut-wrap{display:flex;align-items:center;gap:26px;flex-wrap:wrap}
.donut-legend{display:flex;flex-direction:column;gap:11px;flex:1;min-width:150px}
.leg{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:500}
.leg .sw{width:11px;height:11px;border-radius:3px;flex:none}
.leg b{margin-left:auto;font-family:var(--font-d);font-weight:700;font-size:15px}
.bars{display:flex;flex-direction:column;gap:15px}
.barrow .bl{display:flex;justify-content:space-between;font-size:13px;font-weight:600;margin-bottom:6px}
.barrow .bl .nm{color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:62%}
.barrow .bl .pc{color:var(--muted);font-variant-numeric:tabular-nums}
.track{height:11px;background:var(--line-2);border-radius:99px;position:relative;overflow:hidden}
.fill{height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),#5C8BFF);transition:width 1s cubic-bezier(.2,.8,.2,1)}
.expected{position:absolute;top:-3px;bottom:-3px;width:2px;background:var(--ink);border-radius:2px;opacity:.55}
.expected::after{content:"";position:absolute;top:-4px;left:-3px;border-left:4px solid transparent;border-right:4px solid transparent;border-top:5px solid var(--ink);opacity:.7}
</style>
</head>
<style>

.pcard .foot{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:auto;padding-top:4px}

.e-PROCESO{background:var(--blue-soft);color:var(--blue-d)} .e-PROCESO .d{background:var(--blue)}

.e-RETRASADO{background:var(--red-soft);color:#C01A4C} .e-RETRASADO .d{background:var(--red)}
.e-PAUSADO{background:#EEF0F5;color:#5A6580} .e-PAUSADO .d{background:#8A95AD}
.days{font-size:12px;font-weight:600;color:var(--muted)}
.days b{font-family:var(--font-d);color:var(--text)}
.days.over{color:var(--red)} .days.over b{color:var(--red)}

.empty .big{font-family:var(--font-d);font-size:20px;color:var(--text);margin:14px 0 6px}

@keyframes fade{from{opacity:0}to{opacity:1}}
.modal{background:var(--surface);border-radius:24px;width:100%;max-width:640px;box-shadow:var(--sh-lg);overflow:hidden;animation:pop .35s cubic-bezier(.2,.8,.2,1) both}

.modal-head{padding:24px 26px 20px;border-bottom:1px solid var(--line-2);display:flex;justify-content:space-between;align-items:flex-start;gap:14px;position:relative;overflow:hidden}
.modal-head .glow{position:absolute;right:-30px;top:-40px;width:160px;height:160px;border-radius:50%;background:var(--blue);opacity:.06}
.modal-head h3{font-family:var(--font-d);font-weight:700;font-size:21px;letter-spacing:-.4px;line-height:1.15}
.modal-head .hsub{color:var(--muted);font-size:13px;font-weight:500;margin-top:3px}
.xclose{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;background:var(--surface-2);color:var(--muted);transition:.15s;flex:none}

.modal-body{padding:24px 26px;max-height:62vh;overflow-y:auto}

.field{margin-bottom:16px}
.field label{display:block;font-size:12.5px;font-weight:700;color:#46506B;margin-bottom:7px;letter-spacing:.2px}
.field input,.field select,.field textarea{width:100%;padding:11px 13px;border-radius:11px;border:1px solid var(--line);background:var(--surface);outline:none;transition:.16s;}
.field textarea{resize:vertical;min-height:62px;line-height:1.5}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--blue);box-shadow:0 0 0 4px var(--blue-soft)}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:14px}

.seg{display:flex;gap:8px;background:var(--surface-2);padding:5px;border-radius:12px;border:1px solid var(--line-2)}

.dgrid{display:grid;grid-template-columns:1fr 1fr;gap:13px;margin-bottom:20px}

.dcell{background:var(--surface-2);border:1px solid var(--line-2);border-radius:13px;padding:13px 14px}

  { id:"p1", nombre:"Planificador mensual", tipo:"Especial", proceso:"Todos", responsable:"Ing. Rodrigo", revisor:"Gerencia – Ing. Rodrigo", frecuencia:"mensual", inicio:"2026-01-05", termino:"2026-11-28", modo:"individual", avance:10, estado:"PROCESO", obs:"", tareas:[] },

]};

let FILTERS = { q:"", tipo:"", estado:"", revisor:"" };
const cfgOK = CONFIG.BIN_ID && CONFIG.BIN_ID !== "TU_BIN_ID_AQUI" && CONFIG.MASTER_KEY && CONFIG.MASTER_KEY !== "TU_MASTER_KEY_AQUI";
const today = () => { const d=new Date(); d.setHours(0,0,0,0); return d; };
const parseD = s => s ? new Date(s+"T00:00:00") : null;
const DAY = 86400000;
const fmtD = s => { const d=parseD(s); return d ? d.toLocaleDateString("es-MX",{day:"2-digit",month:"short",year:"numeric"}) : "—"; };
function calc(p){
  const a = parseD(p.inicio), b = parseD(p.termino), t = today();
  let total=null, trans=null, rest=null, esperado=null;
  if(a && b){ total = Math.max(0, Math.round((b-a)/DAY)); if(t<a) trans=0; else if(t>b) trans=total; else trans=Math.round((t-a)/DAY); rest = Math.max(0, Math.round((b-t)/DAY)); esperado = total>0 ? Math.min(100, Math.round(trans/total*100)) : 0; }
  let avance = p.avance||0;
  if(p.modo==="grupo" && p.tareas && p.tareas.length){ avance = Math.round(p.tareas.reduce((s,x)=>s+(x.pct||0),0)/p.tareas.length); }
  let estado = p.estado;
  if(avance>=100) estado="REALIZADO";
  else if(p.estado==="PAUSADO") estado="PAUSADO";
  else if(b && t>b) estado="RETRASADO";
  else estado="PROCESO";
  let risk="r-ok";
  if(estado==="REALIZADO") risk="r-done";
  else if(estado==="PAUSADO") risk="r-pause";
  else if(b && t>b) risk="r-late";
  else if(esperado===null) risk="r-ok";
  else if(avance>=esperado) risk="r-ok";
  else if(esperado-avance<=15) risk="r-warn";
  else risk="r-late";
  return {total,trans,rest,esperado,avance,estado,risk,vencido:(b && t>b && avance<100)};
}
const ESTADO_LABEL = {PROCESO:"En proceso",REALIZADO:"Realizado",RETRASADO:"Retrasado",PAUSADO:"Pausado"};
const tipoClass = t => t==="Especial"?"t-esp":t==="Estratégico"?"t-est":"t-ope";
function setSync(mode){ const el=document.getElementById("sync"), tx=document.getElementById("syncTxt"); el.className="sync "+mode; tx.textContent = mode==="saved"?"Guardado":mode==="local"?"Local (demo)":"Sincronizando…"; }
async function load(){
  if(!cfgOK){ setSync("local"); return; }
  try{ setSync("syncing"); const r = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}/latest`,{headers:{"X-Master-Key":CONFIG.MASTER_KEY}}); if(r.ok){ const j=await r.json(); if(j.record && j.record.projects){ STATE=j.record; } setSync("saved"); } else setSync("local"); }catch(e){ setSync("local"); }
}
async function save(){
  STATE.meta = {updated:new Date().toISOString()};
  if(!cfgOK){ setSync("local"); return; }
  try{ setSync("syncing"); const r=await fetch(`https://api.jsonbin.io/v3/b/${CONFIG.BIN_ID}`,{method:"PUT", headers:{"Content-Type":"application/json","X-Master-Key":CONFIG.MASTER_KEY},body:JSON.stringify(STATE)}); setSync(r.ok?"saved":"local"); }catch(e){ setSync("local"); }
}
const app = document.getElementById("app");
function render(){ VIEW==="dash"?renderDash():renderProy(); }
function renderDash(){
  const ps = STATE.projects.map(p=>({p,c:calc(p)}));
  const total=ps.length;
  const byEstado = {PROCESO:0,REALIZADO:0,RETRASADO:0,PAUSADO:0};
  ps.forEach(x=>byEstado[x.c.estado]++);
  const gAvg = total? Math.round(ps.reduce((s,x)=>s+x.c.avance,0)/total):0;
  const riesgo = ps.filter(x=>x.c.risk==="r-late").length;
  const kpis=[
    {tone:"ink",   lbl:"Proyectos totales", val:total, ic:'<path d="M3 7h18M3 12h18M3 17h18"/>'},
    {tone:"blue",  lbl:"En proceso", val:byEstado.PROCESO, ic:'<circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>'},
    {tone:"green", lbl:"Realizados", val:byEstado.REALIZADO, ic:'<path d="M20 6 9 17l-5-5"/>'},
    {tone:"red",   lbl:"Retrasados", val:byEstado.RETRASADO, ic:'<path d="M12 9v4M12 17h.01"/><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0z"/>'},
    {tone:"gold",  lbl:"Avance global", val:gAvg+"%", ic:'<path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/>'},
    {tone:"amber", lbl:"En riesgo", val:riesgo, ic:'<path d="M12 2 2 7v7c0 5 4 8 10 9 6-1 10-4 10-9V7z"/>'}
  ];
  const kpiHTML = kpis.map((k,i)=>`<div class="kpi tone-${k.tone}" style="animation-delay:${i*55}ms">
    <span class="accent"></span>
    <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${k.ic}</svg></div>
    <div class="val">${k.val}</div><div class="lbl">${k.lbl}</div></div>`).join("");
  const segs=[["PROCESO",byEstado.PROCESO,"#2F6BFF"],["REALIZADO",byEstado.REALIZADO,"#15A34A"],["RETRASADO",byEstado.RETRASADO,"#E0245A"],["PAUSADO",byEstado.PAUSADO,"#8A95AD"]];
  const donut = makeDonut(segs,total);
  const legend = segs.map(s=>`<div class="leg"><span class="sw" style="background:${s[2]}"></span>${ESTADO_LABEL[s[0]]}<b>${s[1]}</b></div>`).join("");
  const order={"r-late":0,"r-warn":1,"r-done":3,"r-pause":4,"r-ok":2};
  const withDates = ps.filter(x=>x.c.esperado!==null).sort((a,b)=>order[a.c.risk]-order[b.c.risk]);
  const bars = withDates.length ? withDates.map(({p,c})=>`
    <div class="barrow"><div class="bl"><span class="nm">${esc(p.nombre)}</span><span class="pc">${c.avance}% / ${c.esperado}%</span></div>
    <div class="track"><div class="fill" style="width:0" data-w="${c.avance}%;background:${barColor(c.risk)}"></div><div class="expected" style="left:${c.esperado}%"></div></div></div>`).join("")
    : `<p style="color:var(--faint);font-size:13px">Aún no hay proyectos con fechas definidas.</p>`;
  const riesgos = ps.filter(x=>x.c.risk==="r-late"||x.c.risk==="r-warn").sort((a,b)=>order[a.c.risk]-order[b.c.risk]);
  const riesgoList = riesgos.length ? riesgos.map(({p,c})=>`
    <div class="alert-card" style="${c.risk==='r-warn'?'background:var(--amber-soft);border-color:#ECDDA8':''}">
      <span class="rdot ${c.risk}" style="margin-top:3px"></span>
      <div><div class="nm" style="${c.risk==='r-warn'?'color:#7A5E0A':''}">${esc(p.nombre)}</div>
      <div class="ds" style="${c.risk==='r-warn'?'color:#8A6A12':''}">${c.vencido?'Vencido · ':''} Avance ${c.avance}% vs esperado ${c.esperado}% · Resp.: ${esc(p.responsable||"—")}</div></div></div>`).join("")
    : `<div class="empty" style="padding:30px"><div class="big" style="font-size:16px">✓ Todo en tiempo</div><p style="font-size:13px">Ningún proyecto en riesgo ahora mismo.</p></div>`;
  app.innerHTML = `<div class="view">
    <div class="page-head"><div><h2>Panel ejecutivo</h2><div class="sub">Avance y cumplimiento de proyectos en tiempo real</div></div></div>

      <div class="panel"><h3>Distribución por estado</h3><div class="ph-sub">${total} proyectos en seguimiento</div><div class="donut-wrap">${donut}<div class="donut-legend">${legend}</div></div></div>
    </div>
    <div class="panel"><h3>⚠ Proyectos que requieren atención</h3><div class="ph-sub">Ordenados por nivel de riesgo</div>${riesgoList}</div>
  </div>`;

function makeDonut(segs,total){
  const R=58,C=2*Math.PI*R; let off=0;
  const arcs = total? segs.filter(s=>s[1]>0).map(s=>{const len=s[1]/total*C;const el=`<circle r="${R}" cx="80" cy="80" fill="none" stroke="${s[2]}" stroke-width="20" stroke-dasharray="${len} ${C-len}" stroke-dashoffset="${-off}" transform="rotate(-90 80 80)" stroke-linecap="butt"/>`;off+=len;return el;}).join("")
    : `<circle r="${R}" cx="80" cy="80" fill="none" stroke="var(--line-2)" stroke-width="20"/>`;
  return `<svg width="160" height="160" viewBox="0 0 160 160" style="flex:none">${arcs}
    <text x="80" y="74" text-anchor="middle" font-family="var(--font-d)" font-weight="700" font-size="34" fill="var(--ink)">${total}</text>
    <text x="80" y="95" text-anchor="middle" font-size="11" font-weight="600" fill="var(--muted)">PROYECTOS</text></svg>`;
}
const barColor = r => r==="r-late"?"linear-gradient(90deg,#E0245A,#F4567E)":r==="r-warn"?"linear-gradient(90deg,#E89611,#F5B544)":r==="r-done"?"linear-gradient(90deg,#15A34A,#3FC76D)":"linear-gradient(90deg,#2F6BFF,#5C8BFF)";
function renderProy(){
  const revOpts = ["",...new Set(STATE.projects.map(p=>p.revisor).filter(Boolean))];
  let list = STATE.projects.map(p=>({p,c:calc(p)}));
  if(FILTERS.q){const q=FILTERS.q.toLowerCase();list=list.filter(({p})=>(p.nombre+p.responsable+p.proceso).toLowerCase().includes(q));}
  if(FILTERS.tipo)list=list.filter(({p})=>p.tipo===FILTERS.tipo);
  if(FILTERS.estado)list=list.filter(({c})=>c.estado===FILTERS.estado);
  if(FILTERS.revisor)list=list.filter(({p})=>p.revisor===FILTERS.revisor);
  const cards = list.length ? list.map(({p,c},i)=>{
    const grpChip = p.modo==="grupo" ? `<span class="chip grp"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/></svg>${p.tareas.length} integrantes</span>` : "";
    const daysHTML = c.rest!==null ? `<span class="days ${c.vencido?'over':''}">${c.vencido?'Vencido hace <b>'+Math.abs(c.rest)+'</b>':'<b>'+c.rest+'</b> días rest.'}</span>` : `<span class="days">Sin fechas</span>`;
    return `<div class="pcard" data-id="${p.id}" style="animation-delay:${i*40}ms">

function openDetail(id){
  const p=STATE.projects.find(x=>x.id===id); if(!p)return; const c=calc(p);
  const cells=[
    ["Tipo",p.tipo],["Proceso / Área",p.proceso||"—"],["Responsable",p.responsable||"Sin asignar"],
    ["Responsable de revisión",p.revisor],["Frecuencia de revisión",cap(p.frecuencia)],["Modalidad",p.modo==="grupo"?"Grupo":"Individual"],
    ["Inicio",fmtD(p.inicio)],["Término",fmtD(p.termino)]
  ];
  const tareas = (p.modo==="grupo"&&p.tareas.length)?`

      <span class="mini"><i style="width:${t.pct||0}%"></i></span><span class="tp">${t.pct||0}%</span></div>`).join("")}</div>`:"";
  const obs = p.obs?`<div class="dcell" style="grid-column:1/-1"><div class="k">Observaciones</div><div class="v" style="font-weight:500">${esc(p.obs)}</div></div>`:"";
  const editBtns = EDIT?`<button class="btn btn-line" id="dDelete" style="margin-right:auto;color:var(--red)">Eliminar</button>
    <button class="btn btn-soft" id="dEdit">Editar datos</button><button class="btn btn-primary" id="dProgress">Actualizar avance</button>`
    :`<button class="btn btn-line" id="dClose2">Cerrar</button>`;
  showModal(`
    <div class="modal-head"><span class="glow"></span>
      <div><h3>${esc(p.nombre)}</h3><div class="hsub"><span class="estado e-${c.estado}" style="padding:3px 9px;font-size:11px"><span class="d"></span>${ESTADO_LABEL[c.estado]}</span></div></div>
      <button class="xclose" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
    <div class="modal-body">
      <div class="dprog"><div class="nums"><div class="big" style="color:${c.risk==='r-late'?'var(--red)':c.risk==='r-warn'?'var(--amber)':c.risk==='r-done'?'var(--green)':'var(--blue-d)'}">${c.avance}<span style="font-size:22px">%</span></div>
        <div class="exp">${c.esperado!==null?`Esperado: <b style="font-family:var(--font-d)">${c.esperado}%</b> · ${c.rest!==null?(c.vencido?'<span style="color:var(--red)">vencido</span>':`${c.rest} días restante`):"sin fechas"}:"Sin fechas definidas"}</div>
        <div class="track" style="height:14px"><div class="fill" style="width:${c.avance}%;background:${barColor(c.risk)}"></div>${c.esperado!==null?`<div class="expected" style="left:${c.esperado}%"></div>`:''}</div></div>
      <div class="dgrid">${cells.map(([k,v])=>`<div class="dcell"><div class="k">${k}</div><div class="v">${esc(String(v))}</div></div>`).join("")}${obs}</div>
      ${tareas}
    </div>
    <div class="modal-foot">${editBtns}</div>`);
  if(EDIT){
    document.getElementById("dEdit").onclick=()=>openForm(p);
    document.getElementById("dProgress").onclick=()=>openProgress(p);
    document.getElementById("dDelete").onclick=()=>{ if(confirm("¿Eliminar este proyecto?")){STATE.projects=STATE.projects.filter(x=>x.id!==p.id);save();closeModal();render();toast("Proyecto eliminado");} };
  } else document.getElementById("dClose2").onclick=closeModal;
}
function openProgress(p){
  if(p.modo==="grupo"){
    const draft=JSON.parse(JSON.stringify(p.tareas));
    const body=()=>{const avg=draft.length?Math.round(draft.reduce((s,t)=>s+(+t.pct||0),0)/draft.length):0;return `
      <div class="modal-head"><div><h3>Actualizar avance</h3><div class="hsub">${esc(p.nombre)} · promedio automático</div></div>
        <button class="xclose" onclick="closeModal()"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M18 6 6 18M6 6l12 12"/></svg></button></div>
      <div class="modal-body"><div class="tasks">${draft.map((t,i)=>`
        <div class="task"><div class="tr1"><input value="${esc(t.integrante)}" data-f="integrante" data-i="${i}" placeholder="Integrante"></div>
          <input value="${esc(t.responsabilidad||'')}" data-f="responsabilidad" data-i="${i}" placeholder="Responsabilidad / tarea" style="width:100%;padding:9px 12px;border-radius:10px;border:1px solid var(--line);margin-bottom:10px">
          <div class="slid"><input type="range" min="0" max="100" step="5" value="${t.pct||0}" data-f="pct" data-i="${i}"><span class="pv">${t.pct||0}%</span></div></div>`).join("")}
        </div><button class="addtask" id="addT"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" style="width:15px;height:15px"><path d="M12 5v14M5 12h14"/></svg>Agregar integrante</button>
        <div style="text-align:center;margin-top:14px"><span class="avg-pill">Avance del proyecto: ${avg}%</span></div></div>
      <div class="modal-foot"><button class="btn btn-line" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" id="saveProg">Guardar avance</button></div>`;};
    showModal(body());
    const rebind=()=>{
      document.querySelectorAll("[data-f]").forEach(el=>{el.oninput=e=>{const i=+e.target.dataset.i,f=e.target.dataset.f;draft[i][f]=f==="pct"?+e.target.value:e.target.value;if(f==="pct"){closeModal();showModal(body());rebind();}};});
      document.getElementById("addT").onclick=()=>{draft.push({id:"t"+Date.now(),integrante:"",responsabilidad:"",pct:0});closeModal();showModal(body());rebind();};
      document.getElementById("saveProg").onclick=()=>{p.tareas=draft.filter(t=>t.integrante.trim());save();closeModal();render();toast("Avance actualizado");};
    };rebind();
  } else {

  document.getElementById("festado").onchange=e=>{FILTERS.estado=e.target.value;renderProy();};
  document.getElementById("frev").onchange=e=>{FILTERS.revisor=e.target.value;renderProy();};
  document.querySelectorAll(".pcard").forEach(c=>c.onclick=()=>openDetail(c.dataset.id));
}
const riskEdge = r => r==="r-late"?"var(--red)":r==="r-warn"?"var(--amber)":r==="r-done"?"var(--green)":r==="r-pause"?"#8A95AD":"var(--blue)";
</script>
